<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="フィギュアスケートのステップお題を作成して、シーケンスを共有できるツール" />
    <meta property="og:title" content="ステップお題作成ツール" />
    <meta property="og:description" content="フィギュアスケートのステップお題を作成して、シーケンスを共有できるツール" />
    <meta property="og:type" content="website" />
    <title>&#x30B9;&#x30C6;&#x30C3;&#x30D7;&#x4F5C;&#x6210;</title>
    <style>
        :root {
  --bg: #0b1020;
  --panel: rgba(18, 26, 49, 0.94);
  --panel-2: #202643;
  --panel-3: #283153;
  --line: #2a365f;
  --line-strong: #3c4b78;
  --text: #eef3ff;
  --muted: #9fb0d9;
  --accent-a: #5b86ff;
  --accent-b: #6dd5ed;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: sans-serif;
}

.wrap {
  padding: 16px;
  max-width: 980px;
  margin: auto;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  background:
    radial-gradient(circle at top right, rgba(109, 213, 237, 0.16), transparent 34%),
    linear-gradient(180deg, rgba(91, 134, 255, 0.12), rgba(91, 134, 255, 0));
}

.panel-title {
  min-width: 0;
}

.panel-title strong {
  display: block;
  font-size: 16px;
}

.panel-title span {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}

.panel-body {
  padding: 14px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.panel-body[hidden] {
  display: none;
}

.tab-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.tab-button {
  width: auto;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 13px;
  font-weight: 700;
}

.tab-button.active {
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  color: #08111e;
  border-color: transparent;
}

.tab-panel[hidden] {
  display: none;
}

.section-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 12px;
}

.field + .field {
  margin-top: 12px;
}

.field-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}

input, select, button, textarea {
  width: 100%;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
  box-sizing: border-box;
}

textarea {
  min-height: 88px;
  resize: vertical;
  line-height: 1.5;
}

button {
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  color: #08111e;
  font-weight: 700;
  border: none;
}

button.secondary {
  background: var(--panel-3);
  color: var(--text);
  border: 1px solid var(--line);
}

.mini-button {
  width: auto;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 999px;
}

.button-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 10px 14px 14px;
}

.count-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
}

.count-stepper {
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: 12px;
  font-size: 20px;
  line-height: 1;
}

.manual-turn-list {
  display: grid;
  gap: 8px;
}

.manual-turn-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
}

.manual-empty {
  padding: 16px 12px;
  border: 1px dashed rgba(255,255,255,0.14);
  border-radius: 12px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

.canvas-wrap {
  margin-top: 16px;
  overflow: auto;
  max-width: 100%;
  max-height: 75vh;
  background: #0a0f1f;
  border-radius: 10px;
  touch-action: pan-x pan-y;
  overscroll-behavior: contain;
}

canvas {
  display: block;
  width: auto;
  height: auto;
  background: #0a0f1f;
  border-radius: 10px;
}

@media (max-width: 720px) {
  .button-row {
    grid-template-columns: 1fr;
  }

  .panel-header {
    align-items: flex-start;
    flex-direction: column;
  }
}
    </style>
</head>
<body>
<div class="wrap">
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title">
                <strong>&#x30B9;&#x30C6;&#x30C3;&#x30D7;&#x304A;&#x984C;&#x4F5C;&#x6210;&#x30C4;&#x30FC;&#x30EB;</strong>
            </div>
            <button id="toggleInputPanel" class="secondary mini-button" type="button">&#x6298;&#x308A;&#x7573;&#x307F;</button>
        </div>

        <div id="inputPanelBody" class="panel-body">
            <div class="tab-row">
                <button id="tabRandom" class="tab-button active" type="button">&#x30E9;&#x30F3;&#x30C0;&#x30E0;&#x751F;&#x6210;</button>
                <button id="tabManual" class="tab-button" type="button">&#x3058;&#x3076;&#x3093;&#x3067;&#x3064;&#x304F;&#x308B;</button>
            </div>

            <div class="section-card" style="margin-bottom:14px;">
                    <div class="field" style="margin-top:0;">
                        <label for="circleSize">&#x5186;&#x306E;&#x5927;&#x304D;&#x3055;</label>
                        <select id="circleSize">
                        <option value="RANDOM">&#x30E9;&#x30F3;&#x30C0;&#x30E0;</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
            </div>

            <div id="panelRandom" class="tab-panel">
                <div class="section-card">
                    <div class="field">
                        <label for="startState">&#x958B;&#x59CB;&#x72B6;&#x614B;</label>
                        <select id="startState"></select>
                    </div>

                    <div class="field">
                        <label for="count">&#x6280;&#x6570;</label>
                        <div class="count-row">
                            <button id="countDown" class="secondary count-stepper" type="button">-</button>
                            <input id="count" type="number" value="10" min="1" max="50"/>
                            <button id="countUp" class="secondary count-stepper" type="button">+</button>
                        </div>
                    </div>

                    <div class="field">
                        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; width:max-content;">
                            <input id="sCurveFixed" type="checkbox" style="width:auto;" />
                            <span>S&#x5B57;&#x56FA;&#x5B9A;</span>
                        </label>
                    </div>

                    <div id="turnFilters" class="field">
                        <div class="field-header">
                            <label>&#x30BF;&#x30FC;&#x30F3;&#x7A2E;&#x985E;</label>
                            <div style="display:flex; gap:6px; flex:0 0 auto;">
                                <button id="checkAllTurns" class="secondary mini-button" type="button">&#x5168;&#x30C1;&#x30A7;&#x30C3;&#x30AF;</button>
                                <button id="clearAllTurns" class="secondary mini-button" type="button">&#x5168;&#x89E3;&#x9664;</button>
                            </div>
                        </div>
                        <div id="turnCheckboxes" style="
                            display:grid;
                            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                            gap:8px;
                        "></div>
                    </div>
                </div>
            </div>

            <div id="panelManual" class="tab-panel" hidden>
                <div class="section-card">
                    <div class="field">
                        <label for="manualStartState">&#x958B;&#x59CB;&#x72B6;&#x614B;</label>
                        <select id="manualStartState"></select>
                    </div>

                    <div class="field">
                        <div class="field-header">
                            <label>&#x30BF;&#x30FC;&#x30F3;&#x30EA;&#x30B9;&#x30C8;</label>
                            <button id="addManualTurn" class="secondary mini-button" type="button">&#x30BF;&#x30FC;&#x30F3;&#x3092;&#x8FFD;&#x52A0;</button>
                        </div>
                        <div id="manualTurnList" class="manual-turn-list"></div>
                    </div>

                    <div class="field">
                        <div class="field-header">
                            <label for="sequenceInput">&#x30B7;&#x30FC;&#x30AF;&#x30A8;&#x30F3;&#x30B9;&#x5165;&#x529B;</label>
                            <div style="display:flex; gap:6px; flex:0 0 auto;">
                                <button id="clearSequenceInput" class="secondary mini-button" type="button">&#x30AF;&#x30EA;&#x30A2;</button>
                                <button id="shareSequence" class="secondary mini-button" type="button">&#x5171;&#x6709;</button>
                                <button id="copySequence" class="secondary mini-button" type="button">&#x30B3;&#x30D4;&#x30FC;</button>
                            </div>
                        </div>
                        <textarea id="sequenceInput" placeholder="&#x4F8B;: 1|LFO:THREE&#x2192;MOHAWK&#x2192;BRACKET"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="button-row">
            <button id="run">&#x751F;&#x6210;</button>
            <button id="play" class="secondary">&#x518D;&#x751F;</button>
        </div>
    </div>

    <div id="canvasViewport" class="canvas-wrap">
        <canvas id="canvas" width="1000" height="1000"></canvas>
    </div>
</div>

<div id="sequence" style="
  margin:12px auto 0;
  max-width:980px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  background:rgba(255,255,255,0.04);
  max-height:200px;
  overflow:auto;
  font-size:13px;
"></div>

<script src="./script.js"></script>
</body>
</html>
