<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
        name="description"
        content="&#x30D5;&#x30A3;&#x30AE;&#x30E5;&#x30A2;&#x30B9;&#x30B1;&#x30FC;&#x30C8;&#x306E;&#x30B9;&#x30C6;&#x30C3;&#x30D7;&#x304A;&#x984C;&#x3092;&#x4F5C;&#x6210;&#x3057;&#x3066;&#x3001;&#x30B7;&#x30FC;&#x30B1;&#x30F3;&#x30B9;&#x3092;&#x5171;&#x6709;&#x3067;&#x304D;&#x308B;&#x30C4;&#x30FC;&#x30EB;"
    />
    <meta
        property="og:title"
        content="&#x30B9;&#x30C6;&#x30C3;&#x30D7;&#x304A;&#x984C;&#x4F5C;&#x6210;&#x30C4;&#x30FC;&#x30EB;"
    />
    <meta
        property="og:description"
        content="&#x30D5;&#x30A3;&#x30AE;&#x30E5;&#x30A2;&#x30B9;&#x30B1;&#x30FC;&#x30C8;&#x306E;&#x30B9;&#x30C6;&#x30C3;&#x30D7;&#x304A;&#x984C;&#x3092;&#x4F5C;&#x6210;&#x3057;&#x3066;&#x3001;&#x30B7;&#x30FC;&#x30B1;&#x30F3;&#x30B9;&#x3092;&#x5171;&#x6709;&#x3067;&#x304D;&#x308B;&#x30C4;&#x30FC;&#x30EB;"
    />
    <meta property="og:type" content="website" />
    <title>&#x30B9;&#x30C6;&#x30C3;&#x30D7;&#x4F5C;&#x6210;</title>
    <style>
        :root {
            --bg: #0b1020;
            --panel: rgba(18, 26, 49, 0.96);
            --panel-2: #202643;
            --panel-3: #283153;
            --line: #2a365f;
            --line-strong: #3c4b78;
            --text: #eef3ff;
            --muted: #9fb0d9;
            --accent-a: #5b86ff;
            --accent-b: #6dd5ed;
            --danger: #ef6b7b;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at top right, rgba(109, 213, 237, 0.12), transparent 26%),
                radial-gradient(circle at bottom left, rgba(91, 134, 255, 0.12), transparent 32%),
                var(--bg);
            color: var(--text);
            font-family: sans-serif;
        }

        button,
        select,
        input {
            font: inherit;
        }

        button,
        select,
        input[type="number"] {
            border-radius: 12px;
            border: 1px solid var(--line);
            background: var(--panel-2);
            color: var(--text);
        }

        button {
            cursor: pointer;
            padding: 10px 14px;
            font-weight: 700;
        }

        button.primary {
            border: none;
            background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
            color: #08111e;
        }

        [hidden] {
            display: none !important;
        }

        button.secondary {
            background: var(--panel-3);
        }

        .app-shell {
            position: relative;
            height: 100%;
            padding: 16px;
            overflow: hidden;
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            max-width: 980px;
            margin: 0 auto;
            padding: 14px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar .spacer {
            flex: 1 1 auto;
        }

        .icon-button {
            width: 42px;
            height: 42px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            line-height: 1;
        }

        .canvas-wrap {
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
            max-width: 100%;
            background: #0a0f1f;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            touch-action: pan-x pan-y;
            overscroll-behavior: contain;
        }

        canvas {
            display: block;
            width: auto;
            height: auto;
            background: #0a0f1f;
            border-radius: 16px;
        }

        .canvas-expand-button {
            position: absolute;
            right: 12px;
            bottom: 12px;
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(11, 16, 32, 0.88);
            color: #eef3ff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            backdrop-filter: blur(6px);
            touch-action: manipulation;
        }

        .canvas-expand-button svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .editor-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .editor-controls button,
        .editor-controls select {
            width: auto;
        }

        .field-stack {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }

        .field-card {
            display: grid;
            gap: 6px;
            min-width: 0;
            flex: 1 1 0;
        }

        .field-card.start-state-field {
            flex: 2 1 0;
        }

        .field-card.circle-size-field {
            flex: 1 1 0;
        }

        .field-card label {
            color: var(--muted);
            font-size: 12px;
        }

        select,
        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
        }

        .turn-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 220px;
            min-height: 220px;
            overflow: auto;
            padding-right: 4px;
        }

        .turn-list-empty {
            padding: 18px 14px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed rgba(255, 255, 255, 0.14);
            border-radius: 14px;
        }

        .turn-row {
            display: grid;
            grid-template-columns: auto auto minmax(0, 1fr) auto;
            gap: 6px;
            align-items: center;
            padding: 5px 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            transition: background 140ms ease, border-color 140ms ease, transform 180ms ease, box-shadow 180ms ease;
        }

        .turn-row.is-active {
            background: rgba(91, 134, 255, 0.22);
            border-color: rgba(109, 213, 237, 0.38);
        }

        .turn-row.is-dragging {
            opacity: 0.96;
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.35);
            border-color: rgba(109, 213, 237, 0.38);
            z-index: 30;
        }

        .turn-row-placeholder {
            border: 1px dashed rgba(109, 213, 237, 0.32);
            border-radius: 14px;
            background: rgba(109, 213, 237, 0.08);
            min-height: 57px;
            box-sizing: border-box;
        }

        .edge-pill {
            min-width: 58px;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--muted);
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .drag-handle {
            width: 28px;
            height: 28px;
            padding: 0;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            font-size: 14px;
            line-height: 1;
            user-select: none;
            touch-action: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .turn-row select {
            min-width: 0;
        }

        .turn-row .remove-button {
            width: auto;
            min-width: 54px;
            color: #ffe7ea;
            background: rgba(239, 107, 123, 0.18);
            border-color: rgba(239, 107, 123, 0.34);
        }

        .bottom-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }

        .main-panel.canvas-focus .bottom-controls {
            display: none;
        }

        .canvas-area {
            position: relative;
            flex: 1 1 auto;
            height: 0;
            min-height: 0;
            overflow: hidden;
        }

        .canvas-area .canvas-wrap {
            position: absolute;
            inset: 0;
            min-height: 0;
            height: auto;
            max-height: none;
        }

        .settings-drawer {
            position: absolute;
            top: 16px;
            left: 16px;
            bottom: 16px;
            width: min(360px, calc(100vw - 32px));
            padding: 14px;
            background: rgba(15, 22, 40, 0.98);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow);
            transform: translateX(calc(-100% - 20px));
            transition: transform 180ms ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
            z-index: 10;
        }

        .settings-overlay {
            position: absolute;
            inset: 0;
            background: rgba(4, 8, 18, 0.26);
            opacity: 0;
            pointer-events: none;
            transition: opacity 180ms ease;
            z-index: 9;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-drawer.open {
            transform: translateX(0);
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .settings-header strong {
            font-size: 16px;
        }

        .settings-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
            overflow: hidden;
        }

        .settings-section {
            display: grid;
            gap: 10px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .count-row {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr) 44px;
            gap: 8px;
            align-items: center;
        }

        .count-stepper {
            width: 44px;
            height: 44px;
            padding: 0;
            font-size: 22px;
            line-height: 1;
        }

        .check-row {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            width: max-content;
        }

        .check-row input {
            width: auto;
            margin: 0;
        }

        .filter-list {
            min-height: 0;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .turn-filter-group {
            display: grid;
            gap: 8px;
        }

        .turn-filter-group-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            padding: 2px 2px 0;
        }

        .turn-filter-card {
            display: grid;
            gap: 8px;
            padding: 10px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            overflow: visible;
        }

        .turn-filter-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 2px;
        }

        .turn-filter-title {
            display: flex;
            align-items: center;
            gap: 2px;
            min-width: 0;
            cursor: pointer;
        }

        .turn-filter-title input {
            width: auto;
            margin: 0;
        }

        .turn-filter-title span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px;
        }

        .edge-toggle-button {
            width: 32px;
            height: 32px;
            padding: 0;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .turn-filter-edges {
            display: grid;
            gap: 6px;
            padding-left: 22px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .turn-filter-edge-row {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 12px;
            padding: 6px 8px;
            border: 1px solid #33416a;
            border-radius: 8px;
            background: #1a213b;
            cursor: pointer;
        }

        .turn-filter-edge-row input {
            width: auto;
            margin: 0;
        }

        @media (max-width: 720px) {
            .app-shell {
                padding: 10px;
            }

            .main-panel {
                padding: 10px;
                border-radius: 18px;
            }

            .toolbar {
                gap: 6px;
            }

            .field-card {
                flex: 1 1 0;
            }

            .settings-drawer {
                top: 10px;
                left: 10px;
                bottom: 10px;
                width: min(340px, calc(100vw - 20px));
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <main class="main-panel">
            <div class="toolbar">
                <button id="toggleSettings" class="secondary icon-button" type="button" aria-label="&#x30E9;&#x30F3;&#x30C0;&#x30E0;&#x6761;&#x4EF6;&#x8A2D;&#x5B9A;">&#x2630;</button>
                <button id="run" class="primary" type="button">&#x30E9;&#x30F3;&#x30C0;&#x30E0;&#x751F;&#x6210;</button>
                <button id="play" class="secondary" type="button">&#x518D;&#x751F;</button>
                <div class="spacer"></div>
                <button id="shareSequence" class="secondary" type="button">&#x5171;&#x6709;</button>
            </div>

            <div class="canvas-area">
                <div id="canvasViewport" class="canvas-wrap">
                    <canvas id="canvas" width="1000" height="1000"></canvas>
                </div>
                <button id="toggleCanvasFocus" class="canvas-expand-button" type="button" aria-label="キャンバスを広く表示" title="キャンバスを広く表示">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 9V3h6M15 3h6v6M21 15v6h-6M9 21H3v-6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="bottom-controls">
                <div class="field-stack">
                    <div class="field-card start-state-field">
                        <label for="startState">&#x958B;&#x59CB;&#x72B6;&#x614B;</label>
                        <select id="startState"></select>
                    </div>
                    <div class="field-card circle-size-field">
                        <label for="circleSize">&#x5186;&#x306E;&#x5927;&#x304D;&#x3055;</label>
                        <select id="circleSize">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>
                </div>

                <div class="editor-controls">
                    <button id="addManualTurn" class="secondary" type="button">&#x30BF;&#x30FC;&#x30F3;&#x8FFD;&#x52A0;</button>
                </div>

                <div id="sequence" class="turn-list"></div>
            </div>
        </main>

        <div id="settingsOverlay" class="settings-overlay" hidden></div>

        <aside id="settingsDrawer" class="settings-drawer" aria-hidden="true">
            <div class="settings-header">
                <strong>&#x30E9;&#x30F3;&#x30C0;&#x30E0;&#x6761;&#x4EF6;</strong>
                <button id="closeSettings" class="secondary icon-button" type="button" aria-label="&#x9589;&#x3058;&#x308B;">&times;</button>
            </div>

            <div class="settings-body">
                <div class="settings-section">
                    <div class="count-row">
                        <button id="countDown" class="secondary count-stepper" type="button">-</button>
                        <input id="count" type="number" value="5" min="1" max="50" />
                        <button id="countUp" class="secondary count-stepper" type="button">+</button>
                    </div>

                    <label class="check-row">
                        <input id="sCurveFixed" type="checkbox" checked />
                        <span>S&#x5B57;&#x56FA;&#x5B9A;</span>
                    </label>

                    <label class="check-row">
                        <input id="randomCircleSize" type="checkbox" />
                        <span>&#x5186;&#x306E;&#x5927;&#x304D;&#x3055;&#x3092;&#x30E9;&#x30F3;&#x30C0;&#x30E0;&#x306B;</span>
                    </label>

                    <label class="check-row">
                        <input id="randomStartState" type="checkbox" checked />
                        <span>&#x958B;&#x59CB;&#x72B6;&#x614B;&#x3092;&#x30E9;&#x30F3;&#x30C0;&#x30E0;&#x306B;</span>
                    </label>
                </div>

                <div class="settings-section" style="min-height:0;">
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                        <strong style="font-size:14px;">&#x6280;&#x30D5;&#x30A3;&#x30EB;&#x30BF;</strong>
                        <div style="display:flex; gap:6px;">
                            <button id="checkAllTurns" class="secondary" type="button">&#x5168;&#x30C1;&#x30A7;&#x30C3;&#x30AF;</button>
                            <button id="clearAllTurns" class="secondary" type="button">&#x5168;&#x89E3;&#x9664;</button>
                        </div>
                    </div>
                    <div id="turnCheckboxes" class="filter-list"></div>
                </div>
            </div>
        </aside>
    </div>

    <script src="./script.js"></script>
</body>
</html>
